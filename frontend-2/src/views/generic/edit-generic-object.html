<!--
Rdit Generic Object:

HTML template for editing the basic information for an object. It will find
fields and expose them as standard inputs. This object can be filled in using
these inputs.

@author lestarch
-->
<template bindable="item">
    <require from="../../converters/generic-object"></require>
    <!--div>${item}</div-->
    <div repeat.for="name of item | genericObject">
        <label for="${name}">${name.charAt(0).toUpperCase() + name.substr(1)}</lable>
        <input type="text" value.two-way="$parent[name]"></input>
        <p>Value: ${item[name]}</p>
    </div>
</template>
